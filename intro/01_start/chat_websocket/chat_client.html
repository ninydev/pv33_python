<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Python Chat</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; }
        #chat { width: 400px; height: 300px; border: 1px solid #ccc; background: white; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; padding: 5px; border-radius: 5px; background: #e1ffc7; }
        .controls { display: flex; gap: 5px; }
    </style>
</head>
<body>
    <h2>Чат на Python + WebSockets</h2>
    <div id="chat"></div>
    <div class="controls">
        <input type="text" id="nick" placeholder="Ник" style="width: 80px;">
        <input type="text" id="message" placeholder="Сообщение..." style="width: 200px;">
        <button onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        // Подключаемся к нашему Python-серверу
        const socket = new WebSocket('ws://127.0.0.1:5555/ws');
        const chatDiv = document.getElementById('chat');

        // Слушаем входящие сообщения
        socket.onmessage = function(event) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.textContent = event.data;
            chatDiv.appendChild(msgDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight; // Прокрутка вниз
        };

        function sendMessage() {
            const nick = document.getElementById('nick').value || 'Аноним';
            const text = document.getElementById('message').value;
            if (text) {
                socket.send(`${nick}: ${text}`);
                document.getElementById('message').value = '';
            }
        }
    </script>
</body>
</html>
