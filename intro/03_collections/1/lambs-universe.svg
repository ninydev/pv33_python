<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="450" fill="#f0fdf4" rx="20"/>
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#166534">Вселенная Барашков</text>

  <!-- Circles (Sets) -->
  <!-- Set A: White Wool -->
  <circle cx="230" cy="180" r="130" fill="#ffffff" stroke="#94a3b8" stroke-width="3" opacity="0.6" />
  <!-- Set B: Blue Eyes -->
  <circle cx="370" cy="180" r="130" fill="#60a5fa" stroke="#2563eb" stroke-width="3" opacity="0.4" />
  <!-- Set C: Has Horns -->
  <circle cx="300" cy="300" r="130" fill="#fbbf24" stroke="#d97706" stroke-width="3" opacity="0.4" />

  <!-- Labels for Sets -->
  <text x="120" y="100" font-family="Arial" font-size="16" font-weight="bold" fill="#64748b">БЕЛАЯ ШЕРСТЬ</text>
  <text x="400" y="100" font-family="Arial" font-size="16" font-weight="bold" fill="#2563eb">ГОЛУБЫЕ ГЛАЗА</text>
  <text x="250" y="430" font-family="Arial" font-size="16" font-weight="bold" fill="#b45309">ЕСТЬ РОЖКИ</text>

  <!-- Sheep placements (The Intersections) -->
  
  <!-- Intersection: All Three (Center) -->
  <text x="300" y="225" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold">ШОН</text>

  <!-- Intersection: White & Blue Eyes (Top center) -->
  <text x="300" y="160" text-anchor="middle" font-family="Arial" font-size="14">Облачко</text>

  <!-- Intersection: White & Horns (Left bottom) -->
  <text x="210" y="270" text-anchor="middle" font-family="Arial" font-size="14">Зевс</text>

  <!-- Intersection: Blue Eyes & Horns (Right bottom) -->
  <text x="390" y="270" text-anchor="middle" font-family="Arial" font-size="14">Титан</text>

  <!-- Only White -->
  <text x="160" y="180" text-anchor="middle" font-family="Arial" font-size="14">Снежок</text>

  <!-- Only Blue Eyes -->
  <text x="440" y="180" text-anchor="middle" font-family="Arial" font-size="14">Пират</text>

  <!-- Only Horns -->
  <text x="300" y="370" text-anchor="middle" font-family="Arial" font-size="14">Блэкки</text>

  <!-- Outside (Universe but no set) -->
  <rect x="20" y="380" width="80" height="40" rx="10" fill="#334155" />
  <text x="60" y="405" text-anchor="middle" font-family="Arial" font-size="14" fill="white">Уголёк</text>
  <text x="110" y="405" font-family="Arial" font-size="12" fill="#64748b">(Черный, карие гл., без рог)</text>
</svg>